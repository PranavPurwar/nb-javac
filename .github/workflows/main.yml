name: CI
on: [push]

jobs: 
  build: 
    name: "Build nb-javac"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2

      - name: Set up JDK 25
        uses: actions/setup-java@v2
        with:
            distribution: 'zulu'
            java-version: '25'

      - name: Build JARs and Patched Sources
        run: |
          ant -f make/langtools/netbeans/nb-javac clean jar zip-nb-javac-sources

      - name: Verify with build-jdk.sh
        run: |
          chmod +x ./build-jdk.sh
          JAVA_HOME_VERSION=$JAVA_HOME ./build-jdk.sh

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nb-javac-complete-package
          path: |
            make/langtools/netbeans/nb-javac/dist/*.jar
            make/langtools/netbeans/nb-javac/dist/*.zip
